<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketplace Ultra Pro Fixed</title>

<style>
body{
  margin:0;
  font-family:Arial;
  color:#e6e6e6;
  background:
    radial-gradient(circle at top, rgba(255,255,255,0.08), transparent 60%),
    linear-gradient(135deg,#1a1a1a,#0f0f0f);
}

/* HEADER */
.header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:12px;
  position:sticky;
  top:0;
  background:rgba(20,20,20,0.6);
  backdrop-filter:blur(20px);
  z-index:2000;
  border-bottom:1px solid rgba(255,255,255,0.08);
}

.icon{font-size:22px;width:40px;text-align:center;cursor:pointer;}

.search{flex:1;margin:0 10px;}
.search input{
  width:100%;
  padding:10px;
  border-radius:12px;
  border:none;
  background:rgba(255,255,255,0.08);
  color:#fff;
}

/* MENÚS */
.menu,.accountMenu{
  display:none;
  position:absolute;
  top:60px;
  width:200px;
  padding:10px;
  border-radius:14px;
  background:rgba(20,20,20,0.9);
  border:1px solid rgba(255,255,255,0.1);
  z-index:9999;
}

.menu{right:10px;}
.accountMenu{left:10px;}

.menu p,.accountMenu p{margin:10px 0;cursor:pointer;}

/* LOGO */
.logo{
  text-align:center;
  padding:18px;
}

.logo img{
  width:520px;
  max-width:100%;
  filter:drop-shadow(0 20px 30px rgba(0,0,0,0.8));
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  padding:15px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:22px;
  padding:12px;
  text-align:center;
  cursor:pointer;
}

/* BOTONES */
.btn{
  display:block;
  margin:6px auto;
  padding:10px;
  width:90%;
  border-radius:12px;
  font-weight:bold;
  color:#e6e6e6;
  border:1px solid rgba(255,255,255,0.12);
  cursor:pointer;
  background:rgba(255,255,255,0.06);
}

/* LIKE / FAVORITO */
.btn-like{background:linear-gradient(135deg,#2a2a2a,#3a3a3a);}
.btn-fav{background:linear-gradient(135deg,#303030,#404040);}

/* ACCIONES */
.whatsapp{
  background:linear-gradient(135deg,#2f2f2f,#3a3a3a);
}

.reservar{
  background:linear-gradient(135deg,#4b2cff,#2d1a66);
}

/* PROFILE */
.profile{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#0f0f0f;
  overflow:auto;
  z-index:5000;
  padding:15px;
}

.box{
  background:rgba(255,255,255,0.04);
  border-radius:20px;
  padding:15px;
  border:1px solid rgba(255,255,255,0.08);
}

/* FOTO GRANDE */
#profileImg{
  width:100%;
  max-width:260px;
  border-radius:20px;
  margin:10px auto;
  display:block;
}

/* GALERÍA */
.media{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
}

.media img{
  width:100%;
  height:90px;
  object-fit:cover;
  border-radius:10px;
}

/* COMMENTS */
textarea{
  width:100%;
  height:70px;
  border-radius:10px;
  border:none;
  padding:10px;
  background:rgba(255,255,255,0.08);
  color:#fff;
}

.comment{
  background:rgba(255,255,255,0.10);
  margin-top:6px;
  padding:8px;
  border-radius:10px;
}

/* FOOTER */
.footer{
  text-align:center;
  padding:20px;
  font-size:12px;
  color:#aaa;
  border-top:1px solid rgba(255,255,255,0.08);
}
</style>
</head>

<body>

<div class="header">
  <div class="icon" onclick="toggleAccount()">👤</div>
  <div class="search"><input placeholder="Buscar servicios..."></div>
  <div class="icon" onclick="toggleMenu()">☰</div>
</div>

<div class="menu">
  <p>Catálogo</p>
  <p>Favoritos</p>
</div>

<div class="accountMenu">
  <p>Mi cuenta</p>
</div>

<div class="logo">
  <img src="file_0000000095c071fd937e0a46af9303bb.svg">
</div>

<div class="grid" id="grid"></div>

<!-- PROFILE -->
<div class="profile" id="profile">
  <div class="box">

    <h2 id="name"></h2>

    <img id="profileImg">

    <p id="info"></p>
    <div id="phone"></div>

    <h3>Presentación</h3>
    <p id="desc"></p>

    <h3>Galería (máx 12)</h3>
    <input type="file" multiple onchange="upload(event)">
    <div class="media" id="media"></div>

    <h3>Reseñas</h3>
    <textarea id="txt"></textarea>
    <button class="btn reservar" onclick="comment()">Enviar</button>
    <div id="comments"></div>

    <button class="btn whatsapp" onclick="closeP()">Cerrar</button>

  </div>
</div>

<div class="footer">
© 2026 Marketplace Ultra Pro
</div>

<script>

const users=[
["Juan Pérez","Caracas","♂","k1.jpg","+58 111","Servicio",5],
["María López","Maracay","♀","k2.jpg","+58 222","Servicio",4],
["Carlos Martínez","Valencia","♂","k3.jpg","+58 333","Servicio",5],
["Ana Torres","Barquisimeto","♀","k4.jpg","+58 444","Servicio",4],
["Luis Gómez","Caracas","♂","k5.jpg","+58 555","Servicio",5],
["Sofía Díaz","Maracaibo","♀","k6.jpg","+58 666","Servicio",5],
["Pedro Ramírez","Valencia","♂","k7.jpg","+58 777","Servicio",4],
["Lucía Fernández","Maracay","♀","k8.jpg","+58 888","Servicio",5]
];

let current=0;
let grid=document.getElementById("grid");

/* RENDER */
function render(){
grid.innerHTML="";
users.forEach((u,i)=>{
grid.innerHTML+=`
<div class="card" onclick="openP(${i})">
<img src="${u[3]}" style="width:80px;height:80px;border-radius:50%">
<h3>${u[0]}</h3>
<div>${u[1]}</div>

<button class="btn btn-like" onclick="event.stopPropagation();like(${i})">
❤️ ${getLikes()[i]||0}
</button>

<button class="btn btn-fav" onclick="event.stopPropagation();toggleFav(${i})">
⭐ Favorito
</button>

<button class="btn whatsapp">WhatsApp</button>
<button class="btn reservar">Reservar</button>
</div>`;
});
}

/* LIKES */
function getLikes(){
return JSON.parse(localStorage.getItem("likes")||"{}");
}

function like(i){
let l=getLikes();
l[i]=(l[i]||0)+1;
localStorage.setItem("likes",JSON.stringify(l));
render();
}

/* FAVORITOS */
function toggleFav(i){
let f=JSON.parse(localStorage.getItem("favs")||"[]");
f.includes(i)?f=f.filter(x=>x!==i):f.push(i);
localStorage.setItem("favs",JSON.stringify(f));
}

/* PERFIL */
function openP(i){
current=i;
document.getElementById("profile").style.display="block";
document.getElementById("name").innerText=users[i][0];
document.getElementById("info").innerText=users[i][1];
document.getElementById("phone").innerText=users[i][4];
document.getElementById("desc").innerText=users[i][5];
document.getElementById("profileImg").src=users[i][3];
loadMedia();
}

/* GALERÍA */
function upload(e){
let files=e.target.files;
let key="m_"+current;
let arr=JSON.parse(localStorage.getItem(key)||"[]");

for(let f of files){
if(arr.length>=12) break;

let r=new FileReader();
r.onload=function(ev){
arr.push(ev.target.result);
localStorage.setItem(key,JSON.stringify(arr));
loadMedia();
};
r.readAsDataURL(f);
}
}

function loadMedia(){
let box=document.getElementById("media");
box.innerHTML="";
let arr=JSON.parse(localStorage.getItem("m_"+current)||"[]");

arr.slice(0,12).forEach(m=>{
box.innerHTML+=`<img src="${m}">`;
});
}

/* COMMENTS */
function comment(){
let t=document.getElementById("txt").value;
if(!t)return;

let key="c_"+current;
let arr=JSON.parse(localStorage.getItem(key)||"[]");
arr.push(t);
localStorage.setItem(key,JSON.stringify(arr));

document.getElementById("txt").value="";
loadComments();
}

function loadComments(){
let box=document.getElementById("comments");
let arr=JSON.parse(localStorage.getItem("c_"+current)||"[]");
box.innerHTML=arr.map(c=>`<div class="comment">${c}</div>`).join("");
}

function closeP(){
document.getElementById("profile").style.display="none";
}

render();

</script>

</body>
</html>
