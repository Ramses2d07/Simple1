<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram Pro Social</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0b0b;
  color:#fff;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px;
  background:rgba(20,20,20,0.7);
  backdrop-filter:blur(20px);
  position:sticky;
  top:0;
  z-index:1000;
}

.icon{width:40px;text-align:center;cursor:pointer;font-size:20px;}

.search{flex:1;margin:0 10px;}
.search input{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
  background:rgba(255,255,255,0.08);
  color:#fff;
}

/* FEED */
.feed{
  padding:10px;
}

/* POST */
.post{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:15px;
  margin-bottom:15px;
  overflow:hidden;
}

.postHeader{
  display:flex;
  align-items:center;
  padding:10px;
  gap:10px;
}

.postHeader img{
  width:40px;
  height:40px;
  border-radius:50%;
}

.postMedia img,.postMedia video{
  width:100%;
}

/* ACTIONS */
.actions{
  display:flex;
  justify-content:space-between;
  padding:10px;
}

.actions button{
  background:none;
  border:none;
  color:#fff;
  font-size:18px;
  cursor:pointer;
}

/* COMMENTS */
.comments{
  padding:10px;
  border-top:1px solid rgba(255,255,255,0.1);
}

.comment{
  background:rgba(255,255,255,0.08);
  margin-top:5px;
  padding:6px;
  border-radius:8px;
}

textarea{
  width:100%;
  height:50px;
  border:none;
  border-radius:8px;
  padding:8px;
  margin-top:5px;
  background:rgba(255,255,255,0.08);
  color:#fff;
}

/* FOOTER */
.footer{
  text-align:center;
  padding:20px;
  font-size:12px;
  color:#aaa;
}
</style>
</head>

<body>

<div class="header">
  <div class="icon">👤</div>
  <div class="search"><input placeholder="Buscar..."></div>
  <div class="icon">☰</div>
</div>

<div class="feed" id="feed"></div>

<div class="footer">
© 2026 Instagram Pro Social System
</div>

<script>

const users=[
["Juan Pérez","k1.jpg"],
["María López","k2.jpg"],
["Carlos Martínez","k3.jpg"],
["Ana Torres","k4.jpg"],
["Luis Gómez","k5.jpg"],
["Sofía Díaz","k6.jpg"],
["Pedro Ramírez","k7.jpg"],
["Lucía Fernández","k8.jpg"]
];

/* POSTS SIMULADOS */
let posts=[
{user:0,type:"img",src:"k1.jpg"},
{user:1,type:"img",src:"k2.jpg"},
{user:2,type:"img",src:"k3.jpg"},
{user:3,type:"img",src:"k4.jpg"}
];

let feed=document.getElementById("feed");

function render(){
feed.innerHTML="";

posts.forEach((p,i)=>{

feed.innerHTML+=`
<div class="post">

<div class="postHeader">
<img src="${users[p.user][1]}">
<b>${users[p.user][0]}</b>
</div>

<div class="postMedia">
${p.type=="img"
? `<img src="${p.src}">`
: `<video src="${p.src}" controls></video>`}
</div>

<div class="actions">
<button onclick="like(${i})">❤️ Like (<span id="l${i}">0</span>)</button>
<button onclick="toggleComment(${i})">💬</button>
</div>

<div class="comments" id="c${i}" style="display:none">
<textarea placeholder="Comentar..."></textarea>
<div id="cl${i}"></div>
</div>

</div>`;
});

}

function like(i){
let el=document.getElementById("l"+i);
el.innerText=parseInt(el.innerText)+1;
}

function toggleComment(i){
let c=document.getElementById("c"+i);
c.style.display=c.style.display=="none"?"block":"none";
}

render();

</script>

</body>
</html>
