<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketplace Pro</title>

<style>
body{
  margin:0;
  font-family:Arial;
  color:#fff;
  background:linear-gradient(135deg,#0b0b0b,#050505);
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px;
  position:sticky;
  top:0;
  background:rgba(20,20,20,0.6);
  backdrop-filter:blur(20px);
  z-index:2000;
}

.icon{font-size:22px;width:40px;text-align:center;cursor:pointer;}

.search{flex:1;margin:0 10px;}
.search input{
  width:100%;
  padding:10px;
  border-radius:12px;
  border:none;
  background:rgba(255,255,255,0.08);
  color:#fff;
}

/* MENÚS */
.menu,.accountMenu{
  display:none;
  position:absolute;
  top:60px;
  width:200px;
  padding:10px;
  border-radius:14px;
  background:rgba(20,20,20,0.9);
  border:1px solid rgba(255,255,255,0.1);
  z-index:9999;
}
.menu{right:10px;}
.accountMenu{left:10px;}
.menu p,.accountMenu p{cursor:pointer;margin:10px 0;}

/* LOGO */
.logo{text-align:center;padding:15px;}
.logo img{width:90%;max-width:800px;}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  padding:15px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:20px;
  padding:12px;
  text-align:center;
  cursor:pointer;
}

/* ONLINE */
.online{
  display:inline-block;
  width:10px;
  height:10px;
  background:#00ff88;
  border-radius:50%;
  margin-left:6px;
  box-shadow:0 0 10px #00ff88;
  animation:pulse 1.5s infinite;
}
@keyframes pulse{
  0%{transform:scale(1);opacity:1;}
  50%{transform:scale(1.4);opacity:0.6;}
  100%{transform:scale(1);opacity:1;}
}

/* STARS */
.stars{
  color:#ffd700;
  font-size:14px;
  margin-top:5px;
}

/* MINI GALERÍA EN TARJETA */
.miniGallery{
  display:flex;
  gap:4px;
  margin-top:8px;
  justify-content:center;
}

.miniGallery img{
  width:40px;
  height:40px;
  object-fit:cover;
  border-radius:8px;
  opacity:0.85;
  transition:0.3s;
}

.miniGallery img:hover{
  transform:scale(1.2);
  opacity:1;
}

/* BUTTONS */
.btn{
  display:block;
  margin:6px auto;
  padding:10px;
  width:90%;
  border-radius:12px;
  border:none;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}
.whatsapp{background:linear-gradient(135deg,#1dbf73,#128c7e);}
.reservar{background:linear-gradient(135deg,#7a2cff,#4a1bb3);}
.fav{background:rgba(255,255,255,0.08);}

/* PROFILE */
.profile{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#0a0a0a;
  overflow:auto;
  z-index:5000;
  padding:15px;
}

.box{background:rgba(255,255,255,0.04);padding:15px;border-radius:20px;}

.phone{font-size:26px;color:#25f4a5;font-weight:bold;}

.media{display:flex;flex-wrap:wrap;gap:10px;}
.media img,.media video{width:120px;border-radius:12px;}

textarea{
  width:100%;
  height:70px;
  border-radius:10px;
  padding:10px;
  background:rgba(255,255,255,0.08);
  color:#fff;
}

.comment{
  background:rgba(255,255,255,0.12);
  margin-top:6px;
  padding:8px;
  border-radius:10px;
}

.footer{
  text-align:center;
  padding:20px;
  font-size:12px;
  color:#aaa;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="icon" onclick="toggleAccount()">👤</div>
  <div class="search"><input placeholder="Buscar..."></div>
  <div class="icon" onclick="toggleMenu()">☰</div>
</div>

<!-- MENÚ -->
<div class="menu">
  <p onclick="showAll()">🏠 Home</p>
  <p onclick="showFavorites()">❤️ Favoritos</p>
</div>

<div class="accountMenu">
  <p>Mi cuenta</p>
  <p>Reservas</p>
</div>

<!-- LOGO -->
<div class="logo">
  <img src="file_0000000095c071fd937e0a46af9303bb.svg">
</div>

<!-- GRID -->
<div class="grid" id="grid"></div>

<!-- PROFILE -->
<div class="profile" id="profile">
  <div class="box">

    <h2 id="name"></h2>
    <p id="info"></p>
    <div class="phone" id="phone"></div>

    <h3>📸 Galería</h3>
    <input type="file" multiple accept="image/*,video/*" onchange="upload(event)">
    <div class="media" id="media"></div>

    <h3>💬 Comentarios</h3>
    <textarea id="txt"></textarea>
    <button class="btn reservar" onclick="comment()">Enviar</button>
    <div id="comments"></div>

    <button class="btn whatsapp" onclick="closeP()">Cerrar</button>

  </div>
</div>

<script>

/* MENÚS */
function toggleMenu(){
  let m=document.querySelector(".menu");
  m.style.display=(m.style.display==="block")?"none":"block";
}

function toggleAccount(){
  let m=document.querySelector(".accountMenu");
  m.style.display=(m.style.display==="block")?"none":"block";
}

/* USERS */
const users=[
["Juan Pérez","Caracas","+58 1","k1.jpg"],
["María López","Maracay","+58 2","k2.jpg"],
["Carlos Martínez","Valencia","+58 3","k3.jpg"],
["Ana Torres","Barquisimeto","+58 4","k4.jpg"],
["Luis Gómez","Caracas","+58 5","k5.jpg"],
["Sofía Díaz","Valencia","+58 6","k6.jpg"],
["Pedro Ramírez","Maracaibo","+58 7","k7.jpg"],
["Lucía Fernández","Maracay","+58 8","k8.jpg"]
];

let current=0;
let grid=document.getElementById("grid");

function renderGrid(){
grid.innerHTML="";

users.forEach((u,i)=>{

grid.innerHTML+=`
<div class="card" onclick="openP(${i})">

<h3>${u[0]} <span class="online"></span></h3>

<div>${u[1]}</div>
<div class="stars">⭐⭐⭐⭐☆</div>

<div class="miniGallery" id="mini_${i}"></div>

<button class="btn whatsapp">WhatsApp</button>
<button class="btn reservar">Reservar</button>

</div>`;

setTimeout(()=>loadMini(i),100);

});
}

function loadMini(i){
let box=document.getElementById("mini_"+i);
let arr=JSON.parse(localStorage.getItem("m_"+i)||"[]");

let imgs=arr.filter(x=>x.type.includes("image")).slice(0,3);

box.innerHTML=imgs.map(img=>`<img src="${img.data}">`).join("");
}

renderGrid();

/* PROFILE */
function openP(i){
current=i;
document.getElementById("profile").style.display="block";

document.getElementById("name").innerText=users[i][0];
document.getElementById("info").innerText=users[i][1];
document.getElementById("phone").innerText=users[i][2];

loadMedia();
loadComments();
}

function closeP(){
document.getElementById("profile").style.display="none";
}

/* MEDIA */
function upload(e){
let files=e.target.files;

for(let f of files){
let r=new FileReader();

r.onload=function(ev){
let arr=JSON.parse(localStorage.getItem("m_"+current)||"[]");
arr.push({data:ev.target.result,type:f.type});
localStorage.setItem("m_"+current,JSON.stringify(arr));
loadMedia();
renderGrid();
};

r.readAsDataURL(f);
}
}

function loadMedia(){
let box=document.getElementById("media");
box.innerHTML="";
let arr=JSON.parse(localStorage.getItem("m_"+current)||"[]");

arr.forEach(m=>{
box.innerHTML+=m.type.includes("image")
? `<img src="${m.data}">`
: `<video src="${m.data}" controls></video>`;
});
}

/* COMMENTS */
function comment(){
let t=document.getElementById("txt").value;
if(!t)return;

let arr=JSON.parse(localStorage.getItem("c_"+current)||"[]");
arr.push(t);
localStorage.setItem("c_"+current,JSON.stringify(arr));

document.getElementById("txt").value="";
loadComments();
}

function loadComments(){
let box=document.getElementById("comments");
box.innerHTML=(JSON.parse(localStorage.getItem("c_"+current)||"[]"))
.map(c=>`<div class="comment">${c}</div>`).join("");
}

/* FAVORITES SIMPLIFIED */
function showFavorites(){
grid.innerHTML="❤️ Favoritos (pendiente conexión completa)";
}

function showAll(){
renderGrid();
}

</script>

</body>
</html>
