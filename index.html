<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Red Social Premium</title>

<style>
body{
  margin:0;
  font-family:Arial;
  color:#fff;
  background:
    radial-gradient(circle at top, rgba(120,120,120,0.25), transparent 60%),
    linear-gradient(135deg,#1a1a1a,#0d0d0d);
}

.header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:12px;
  position:sticky;
  top:0;
  background:rgba(25,25,25,0.6);
  backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(255,255,255,0.1);
}

.icon{font-size:22px;cursor:pointer;width:40px;text-align:center;}

.search{flex:1;margin:0 10px;}
.search input{
  width:100%;
  padding:10px;
  border-radius:12px;
  border:none;
  background:rgba(255,255,255,0.08);
  color:white;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  padding:15px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:20px;
  padding:12px;
  text-align:center;
  backdrop-filter:blur(15px);
  cursor:pointer;
}

.card img{
  width:80px;
  height:80px;
  border-radius:50%;
}

.price{color:#00ff9a;font-weight:bold;}
.stars{color:gold;}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.95);
  padding:20px;
}

.modalBox{
  background:rgba(255,255,255,0.06);
  padding:15px;
  border-radius:15px;
}

.close{float:right;font-size:25px;cursor:pointer;}

.footer{
  text-align:center;
  padding:20px;
  font-size:12px;
  color:#aaa;
}
</style>
</head>

<body>

<div class="header">
  <div class="icon">👤</div>
  <div class="search"><input placeholder="Buscar usuarios..."></div>
  <div class="icon">☰</div>
</div>

<div class="grid" id="grid"></div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modalBox">
    <span class="close" onclick="closeM()">✖</span>
    <h2 id="name"></h2>
    <p id="info"></p>
    <div class="stars">⭐⭐⭐⭐⭐</div>
  </div>
</div>

<div class="footer">
© 2026 Red Social Premium
</div>

<script>

const users = [
{name:"Juan Pérez",city:"Caracas",sex:"♂",price:"$20",img:"k1.jpg"},
{name:"María López",city:"Maracay",sex:"♀",price:"$25",img:"k2.jpg"},
{name:"Carlos Martínez",city:"Valencia",sex:"♂",price:"$30",img:"k3.jpg"},
{name:"Ana Torres",city:"Barquisimeto",sex:"♀",price:"$28",img:"k4.jpg"},
{name:"Luis Gómez",city:"Caracas",sex:"♂",price:"$22",img:"k5.jpg"},
{name:"Sofía Díaz",city:"Valencia",sex:"♀",price:"$27",img:"k6.jpg"},
{name:"Pedro Ramírez",city:"Maracaibo",sex:"♂",price:"$24",img:"k7.jpg"},
{name:"Lucía Fernández",city:"Maracay",sex:"♀",price:"$30",img:"k8.jpg"}
];

const grid=document.getElementById("grid");

users.forEach((u,i)=>{
  const div=document.createElement("div");
  div.className="card";
  div.onclick=()=>open(i);

  div.innerHTML=`
    <img src="${u.img}">
    <h3>${u.name}</h3>
    <div class="stars">⭐⭐⭐⭐☆</div>
    <div class="price">${u.price}</div>
    <div>${u.city} | ${u.sex}</div>
  `;

  grid.appendChild(div);
});

function open(i){
  const u=users[i];
  document.getElementById("name").innerText=u.name;
  document.getElementById("info").innerText=u.city+" | "+u.sex;
  document.getElementById("modal").style.display="block";
}

function closeM(){
  document.getElementById("modal").style.display="none";
}

</script>

</body>
</html>
