<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketplace Pro Level 3</title>

<style>
body{
  margin:0;
  font-family:Arial;
  color:#fff;
  background:linear-gradient(135deg,#0b0b0b,#050505);
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px;
  position:sticky;
  top:0;
  background:rgba(20,20,20,0.6);
  backdrop-filter:blur(20px);
  z-index:2000;
}

.icon{font-size:22px;width:40px;text-align:center;cursor:pointer;}

.search{flex:1;margin:0 10px;}
.search input{
  width:100%;
  padding:10px;
  border-radius:12px;
  border:none;
  background:rgba(255,255,255,0.08);
  color:#fff;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  padding:15px;
}

/* CARD PRO */
.card{
  background:rgba(255,255,255,0.04);
  border-radius:18px;
  padding:12px;
  border:1px solid rgba(255,255,255,0.08);
  cursor:pointer;
  position:relative;
}

/* VERIFIED */
.verified{
  color:#00ffcc;
  font-size:12px;
  margin-left:5px;
}

/* ONLINE */
.online{
  width:10px;
  height:10px;
  border-radius:50%;
  display:inline-block;
  background:#00ff88;
  margin-left:6px;
}

/* GALLERY */
.gallery{
  display:flex;
  gap:5px;
  overflow-x:auto;
  margin-top:10px;
}

.gallery img{
  width:70px;
  height:70px;
  border-radius:10px;
  object-fit:cover;
}

/* BUTTONS */
.btn{
  display:block;
  margin:6px auto;
  padding:10px;
  width:90%;
  border-radius:12px;
  border:none;
  font-weight:bold;
  color:#fff;
}
.wp{background:#1dbf73;}
.res{background:#7a2cff;}
.fav{background:#222;}

/* PROFILE */
.profile{
  display:none;
  position:fixed;
  inset:0;
  background:#0a0a0a;
  padding:15px;
  overflow:auto;
  z-index:5000;
}

.box{
  background:rgba(255,255,255,0.04);
  padding:15px;
  border-radius:20px;
}

.phone{
  font-size:28px;
  color:#25f4a5;
}

/* FEED POST */
.post{
  margin-top:15px;
  background:rgba(255,255,255,0.04);
  padding:10px;
  border-radius:12px;
}

.post img{
  width:100%;
  border-radius:10px;
}

.like{
  margin-top:5px;
  cursor:pointer;
  color:#ff4d6d;
}

/* FLOAT BACK */
.back{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#7a2cff;
  padding:12px 14px;
  border-radius:50px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
  <div class="icon">👤</div>
  <div class="search"><input placeholder="Buscar..."></div>
  <div class="icon">☰</div>
</div>

<div class="grid" id="grid"></div>

<div class="profile" id="profile">
  <div class="box">

    <h2 id="name"></h2>
    <div class="phone" id="phone"></div>

    <h3>📸 Galería</h3>
    <div class="gallery" id="gallery"></div>

    <h3>📢 Publicaciones</h3>
    <div id="feed"></div>

    <button class="btn wp">WhatsApp</button>
    <button class="btn res">Reservar</button>
    <button class="btn fav">Favorito</button>

    <button class="btn res" onclick="closeP()">Cerrar</button>
  </div>
</div>

<div class="back" onclick="render()">🔙</div>

<script>

const users=[
["Juan Pérez","k1.jpg",true],
["María López","k2.jpg",true],
["Carlos Martínez","k3.jpg",false],
["Ana Torres","k4.jpg",true]
];

function render(){
let g=document.getElementById("grid");
g.innerHTML="";

users.forEach((u,i)=>{
g.innerHTML+=`
<div class="card" onclick="openP(${i})">

<h3>${u[0]} ${u[2]?"<span class='verified'>✔</span>":""}</h3>
<span class="online"></span>

<div class="gallery">
<img src="${u[1]}">
<img src="${u[1]}">
</div>

<button class="btn wp">WhatsApp</button>
<button class="btn res">Reservar</button>

</div>`;
});
}

function openP(i){
document.getElementById("profile").style.display="block";
document.getElementById("name").innerText=users[i][0];
document.getElementById("phone").innerText="📞 +58 xxx";

let feed=document.getElementById("feed");
feed.innerHTML="";

for(let x=0;x<3;x++){
feed.innerHTML+=`
<div class="post">
<img src="${users[i][1]}">
<div class="like">❤️ Me gusta</div>
</div>`;
}

let gal=document.getElementById("gallery");
gal.innerHTML=`<img src="${users[i][1]}"><img src="${users[i][1]}">`;
}

function closeP(){
document.getElementById("profile").style.display="none";
}

render();

</script>

</body>
</html>
