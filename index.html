<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketplace</title>

<style>
body{
margin:0;
font-family:Arial;
color:#fff;
background:linear-gradient(135deg,#181818,#222);
}

/* HEADER */
.header{
display:flex;
align-items:center;
justify-content:space-between;
padding:10px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
}

.logo{
font-size:22px;
font-weight:bold;
}

.menuBtn{
cursor:pointer;
font-size:22px;
}

.menu{
display:none;
position:absolute;
right:10px;
top:50px;
background:#222;
padding:10px;
border-radius:10px;
}

.menu p{cursor:pointer;margin:5px 0;}

/* GRID */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
padding:10px;
}

.card{
background:rgba(255,255,255,0.05);
padding:10px;
border-radius:15px;
cursor:pointer;
}

.online{
width:10px;height:10px;
background:#0f0;
border-radius:50%;
display:inline-block;
}

/* GALLERY */
.miniGallery{
display:flex;
gap:5px;
flex-wrap:wrap;
}

.miniGallery img{
width:45px;
height:45px;
object-fit:cover;
border-radius:8px;
}

/* PROFILE */
.profile{
display:none;
position:fixed;
inset:0;
background:#000;
padding:10px;
overflow:auto;
}

/* VIEWER */
.viewer{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
}

.viewer img{
max-width:90%;
}

/* BUTTON */
.btn{
width:100%;
padding:8px;
margin-top:5px;
border:none;
border-radius:10px;
}

/* LOCATION */
#locations{
display:none;
padding:10px;
}

.footer{
text-align:center;
font-size:12px;
color:#aaa;
padding:20px;
}
</style>
</head>

<body>

<div class="header">
<div class="logo">Marketplace</div>
<div class="menuBtn" onclick="toggleMenu()">☰</div>
</div>

<div class="menu" id="menu">
<p onclick="showCatalog()">Catálogo</p>
<p onclick="showFavorites()">Favoritos</p>
<p onclick="showLocations()">Ubicación</p>
</div>

<div class="grid" id="grid"></div>

<div id="locations">
<h3>Ciudades</h3>
<div class="card" onclick="selectCity('Caracas')">Caracas</div>
<div class="card" onclick="selectCity('Maracay')">Maracay</div>
<button class="btn" onclick="backCatalog()">Volver</button>
</div>

<div class="profile" id="profile">
<h2 id="name"></h2>
<p id="phone"></p>

<input type="file" multiple onchange="upload(event)">
<div id="profileGallery" class="miniGallery"></div>

<textarea id="txt"></textarea>
<button class="btn" onclick="comment()">Enviar</button>
<div id="comments"></div>

<button class="btn" onclick="closeP()">Cerrar</button>
</div>

<div class="viewer" id="viewer" onclick="closeViewer()">
<img id="viewerImg">
</div>

<div class="footer">
© 2026 Marketplace. Todos los derechos reservados.
</div>

<script>

let current=0;
let view="catalog";
let selectedCity=null;

const users=[
["Juan","Caracas","111",5,["img1.jpg"]],
["Maria","Maracay","222",4,["img2.jpg"]]
];

/* MENU */
function toggleMenu(){
let m=document.getElementById("menu");
m.style.display=m.style.display==="block"?"none":"block";
}

/* RENDER */
function render(){
let g=document.getElementById("grid");
g.innerHTML="";

users.forEach((u,i)=>{

if(selectedCity && u[1]!=selectedCity) return;
if(view==="favorites" && !getFavs().includes(i)) return;

g.innerHTML+=`
<div class="card" onclick="openP(${i})">

<h3>${u[0]} <span class="online"></span></h3>
<div>${u[1]}</div>

<div class="miniGallery">
${u[4].map(img=>`<img src="${img}" onclick="event.stopPropagation();openViewer('${img}')">`).join("")}
</div>

<button onclick="event.stopPropagation();like(${i})">❤️ ${getLikes(i)}</button>
<button onclick="event.stopPropagation();toggleFav(${i})">⭐</button>

</div>`;
});
}

/* PROFILE */
function openP(i){
current=i;
document.getElementById("profile").style.display="block";
document.getElementById("name").innerText=users[i][0];
document.getElementById("phone").innerText=users[i][2];
loadGallery();
loadComments();
}

function closeP(){
document.getElementById("profile").style.display="none";
}

/* FAVORITOS */
function getFavs(){
return JSON.parse(localStorage.getItem("favs")||"[]");
}

function toggleFav(i){
let f=getFavs();
f.includes(i)?f=f.filter(x=>x!==i):f.push(i);
localStorage.setItem("favs",JSON.stringify(f));
render();
}

function showFavorites(){
view="favorites";
render();
}

/* LIKES */
function getLikes(i){
let l=JSON.parse(localStorage.getItem("likes")||"{}");
return l[i]||0;
}

function like(i){
let l=JSON.parse(localStorage.getItem("likes")||"{}");
l[i]=(l[i]||0)+1;
localStorage.setItem("likes",JSON.stringify(l));
render();
}

/* LOCATION */
function showLocations(){
document.getElementById("grid").style.display="none";
document.getElementById("locations").style.display="block";
}

function selectCity(c){
selectedCity=c;
backCatalog();
}

function backCatalog(){
document.getElementById("locations").style.display="none";
document.getElementById("grid").style.display="grid";
render();
}

function showCatalog(){
view="catalog";
render();
}

/* GALLERY */
function upload(e){
for(let f of e.target.files){
let r=new FileReader();
r.onload=function(ev){
let arr=JSON.parse(localStorage.getItem("mini_"+current)||"[]");
arr.push(ev.target.result);
localStorage.setItem("mini_"+current,JSON.stringify(arr));
loadGallery();
};
r.readAsDataURL(f);
}
}

function loadGallery(){
let box=document.getElementById("profileGallery");
let arr=JSON.parse(localStorage.getItem("mini_"+current)||"[]");

box.innerHTML=arr.length?arr.map(i=>`<img src="${i}" onclick="openViewer('${i}')">`).join(""):"";
}

/* VIEWER */
function openViewer(src){
document.getElementById("viewer").style.display="flex";
document.getElementById("viewerImg").src=src;
}

function closeViewer(){
document.getElementById("viewer").style.display="none";
}

/* COMMENTS */
function comment(){
let t=document.getElementById("txt").value;
if(!t)return;

let arr=JSON.parse(localStorage.getItem("c_"+current)||"[]");
arr.push(t);
localStorage.setItem("c_"+current,JSON.stringify(arr));
document.getElementById("txt").value="";
loadComments();
}

function loadComments(){
document.getElementById("comments").innerHTML=
(JSON.parse(localStorage.getItem("c_"+current)||"[]")).map(c=>`<div>${c}</div>`).join("");
}

render();

</script>

</body>
</html>
