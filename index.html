<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketplace Ultra Pro Fixed</title>

<style>
body{
  margin:0;
  font-family:Arial;
  color:#e6e6e6;
  background:
    radial-gradient(circle at top, rgba(255,255,255,0.08), transparent 60%),
    linear-gradient(135deg,#1a1a1a,#0f0f0f);
}

/* HEADER */
.header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:12px;
  position:sticky;
  top:0;
  background:rgba(20,20,20,0.6);
  backdrop-filter:blur(20px);
  z-index:2000;
  border-bottom:1px solid rgba(255,255,255,0.08);
}

.icon{font-size:22px;width:40px;text-align:center;cursor:pointer;}

.search{flex:1;margin:0 10px;}
.search input{
  width:100%;
  padding:10px;
  border-radius:12px;
  border:none;
  background:rgba(255,255,255,0.08);
  color:#fff;
}

/* MENÚS */
.menu,.accountMenu{
  display:none;
  position:absolute;
  top:60px;
  width:200px;
  padding:10px;
  border-radius:14px;
  background:rgba(20,20,20,0.9);
  border:1px solid rgba(255,255,255,0.1);
  z-index:9999;
}

.menu{right:10px;}
.accountMenu{left:10px;}

.menu p,.accountMenu p{margin:10px 0;cursor:pointer;}

/* LOGO */
.logo{
  text-align:center;
  padding:18px;
}

.logo img{
  width:90%;
  max-width:800px;
  filter:drop-shadow(0 20px 30px rgba(0,0,0,0.8));
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  padding:15px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:22px;
  padding:12px;
  text-align:center;
  cursor:pointer;
  transition:0.3s;
  position:relative;
  backdrop-filter:blur(12px);
}

.card:hover{
  transform:translateY(-6px) scale(1.02);
  border:1px solid rgba(255,255,255,0.18);
}

.card img{
  width:80px;
  height:80px;
  border-radius:50%;
}

/* ONLINE */
.online{
  display:inline-block;
  width:10px;
  height:10px;
  background:#00ff88;
  border-radius:50%;
  margin-left:6px;
}

/* STARS */
.stars{
  color:#ffd700;
  font-size:14px;
  margin-top:5px;
}

/* BOTONES */
.btn{
  display:block;
  margin:6px auto;
  padding:10px;
  width:90%;
  border-radius:12px;
  font-weight:bold;
  color:#e6e6e6;
  border:1px solid rgba(255,255,255,0.12);
  cursor:pointer;
  background:rgba(255,255,255,0.06);
}

.btn-like{
  background:linear-gradient(135deg,#2a2a2a,#3a3a3a);
}

.btn-fav{
  background:linear-gradient(135deg,#303030,#404040);
}

.whatsapp{
  background:linear-gradient(135deg,#2b2b2b,#3a3a3a);
}

.reservar{
  background:linear-gradient(135deg,#3a3a3a,#4a4a4a);
}

/* PROFILE */
.profile{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#0f0f0f;
  overflow:auto;
  z-index:5000;
  padding:15px;
}

.box{
  background:rgba(255,255,255,0.04);
  border-radius:20px;
  padding:15px;
  border:1px solid rgba(255,255,255,0.08);
}

/* 🔥 FOTO GRANDE PERFIL */
#profileImg{
  width:100%;
  max-width:260px;
  border-radius:20px;
  margin:10px auto;
  display:block;
  border:1px solid rgba(255,255,255,0.12);
  box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

.phone{
  font-size:26px;
  font-weight:bold;
  color:#bdbdbd;
  margin:10px 0;
}

.media{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}

.media img,.media video{
  width:120px;
  border-radius:12px;
}

/* COMMENTS */
textarea{
  width:100%;
  height:70px;
  border-radius:10px;
  border:none;
  padding:10px;
  background:rgba(255,255,255,0.08);
  color:#fff;
}

.comment{
  background:rgba(255,255,255,0.10);
  margin-top:6px;
  padding:8px;
  border-radius:10px;
}

/* FOOTER */
.footer{
  text-align:center;
  padding:20px;
  font-size:12px;
  color:#aaa;
  border-top:1px solid rgba(255,255,255,0.08);
}
</style>
</head>

<body>

<div class="header">
  <div class="icon" onclick="toggleAccount()">👤</div>
  <div class="search"><input placeholder="Buscar servicios..."></div>
  <div class="icon" onclick="toggleMenu()">☰</div>
</div>

<div class="menu">
  <p onclick="render()">Catálogo</p>
  <p onclick="showFavorites()">Favoritos</p>
  <p onclick="filterCity('Caracas')">Caracas</p>
  <p onclick="filterCity('Maracay')">Maracay</p>
  <p onclick="filterCity('Valencia')">Valencia</p>
</div>

<div class="accountMenu">
  <p>Mi cuenta</p>
  <p>Favoritos</p>
</div>

<div class="logo">
  <img src="file_0000000095c071fd937e0a46af9303bb.svg">
</div>

<div class="grid" id="grid"></div>

<div class="profile" id="profile">
  <div class="box">

    <h2 id="name"></h2>

    <!-- 🔥 FOTO GRANDE -->
    <img id="profileImg">

    <p id="info"></p>
    <div class="phone" id="phone"></div>

    <h3>Presentación</h3>
    <p id="desc"></p>

    <h3>Galería</h3>
    <input type="file" multiple accept="image/*,video/*" onchange="upload(event)">
    <div class="media" id="media"></div>

    <h3>Reseñas</h3>
    <textarea id="txt"></textarea>
    <button class="btn reservar" onclick="comment()">Enviar</button>
    <div id="comments"></div>

    <button class="btn whatsapp" onclick="closeP()">Cerrar</button>
  </div>
</div>

<div class="footer">
© 2026 Marketplace Ultra Pro. Todos los derechos reservados.
</div>

<script>

function toggleMenu(){
let m=document.querySelector(".menu");
m.style.display=(m.style.display==="block")?"none":"block";
}

function toggleAccount(){
let m=document.querySelector(".accountMenu");
m.style.display=(m.style.display==="block")?"none":"block";
}

const users=[
["Juan Pérez","Caracas","♂","k1.jpg","+58 111","Servicio",5],
["María López","Maracay","♀","k2.jpg","+58 222","Servicio",4],
["Carlos Martínez","Valencia","♂","k3.jpg","+58 333","Servicio",5],
["Ana Torres","Barquisimeto","♀","k4.jpg","+58 444","Servicio",4],
["Luis Gómez","Caracas","♂","k5.jpg","+58 555","Servicio",5],
["Sofía Díaz","Maracaibo","♀","k6.jpg","+58 666","Servicio",5],
["Pedro Ramírez","Valencia","♂","k7.jpg","+58 777","Servicio",4],
["Lucía Fernández","Maracay","♀","k8.jpg","+58 888","Servicio",5]
];

let current=0;
let selectedCity=null;
let grid=document.getElementById("grid");

function render(){
grid.innerHTML="";

users.forEach((u,i)=>{

if(selectedCity && u[1]!==selectedCity) return;

grid.innerHTML+=`
<div class="card" onclick="openP(${i})">
<img src="${u[3]}">
<h3>${u[0]}</h3>
<div>${u[1]}</div>
<div class="stars">${"⭐".repeat(u[6])}</div>

<button class="btn btn-like" onclick="event.stopPropagation();like(${i})">
❤️ ${getLikes()[i]||0}
</button>

<button class="btn btn-fav" onclick="event.stopPropagation();toggleFav(${i})">
⭐ Favorito
</button>

<button class="btn whatsapp">WhatsApp</button>
<button class="btn reservar">Reservar</button>
</div>`;
});
}

function getLikes(){
return JSON.parse(localStorage.getItem("likes")||"{}");
}

function like(i){
let l=getLikes();
l[i]=(l[i]||0)+1;
localStorage.setItem("likes",JSON.stringify(l));
render();
}

function getFavs(){
return JSON.parse(localStorage.getItem("favs")||"[]");
}

function toggleFav(i){
let f=getFavs();
f.includes(i)?f=f.filter(x=>x!==i):f.push(i);
localStorage.setItem("favs",JSON.stringify(f));
}

function filterCity(c){
selectedCity=c;
render();
}

function openP(i){
current=i;
document.getElementById("profile").style.display="block";

document.getElementById("name").innerText=users[i][0];
document.getElementById("info").innerText=users[i][1];
document.getElementById("phone").innerText=users[i][4];
document.getElementById("desc").innerText=users[i][5];

document.getElementById("profileImg").src = users[i][3];

loadMedia();
loadComments();
}

function closeP(){
document.getElementById("profile").style.display="none";
}

function upload(e){}
function comment(){}

render();

</script>

</body>
</html>
