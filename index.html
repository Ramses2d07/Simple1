<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketplace Pro Final Fix</title>

<style>
body{
  margin:0;
  font-family:Arial;
  color:#fff;
  background:linear-gradient(135deg,#0b0b0b,#050505);
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px;
  position:sticky;
  top:0;
  background:rgba(20,20,20,0.6);
  backdrop-filter:blur(20px);
  z-index:2000;
}

.icon{font-size:22px;width:40px;text-align:center;cursor:pointer;}

.search{flex:1;margin:0 10px;}
.search input{
  width:100%;
  padding:10px;
  border-radius:12px;
  border:none;
  background:rgba(255,255,255,0.08);
  color:#fff;
}

/* MENÚ */
.menu,.accountMenu{
  display:none;
  position:absolute;
  top:60px;
  width:200px;
  padding:10px;
  border-radius:14px;
  background:rgba(20,20,20,0.9);
  border:1px solid rgba(255,255,255,0.1);
  z-index:9999;
}
.menu{right:10px;}
.accountMenu{left:10px;}
.menu p,.accountMenu p{cursor:pointer;margin:10px 0;}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  padding:15px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.04);
  border-radius:20px;
  padding:12px;
  border:1px solid rgba(255,255,255,0.08);
  cursor:pointer;
}

/* ONLINE */
.online{
  width:10px;height:10px;
  border-radius:50%;
  display:inline-block;
  background:#00ff88;
  margin-left:6px;
  box-shadow:0 0 10px #00ff88;
}

/* ⭐ ESTRELLAS (FIX REAL) */
.stars{
  color:#ffd700;
  font-size:14px;
  margin-top:5px;
  letter-spacing:1px;
}

/* GALERÍA */
.miniGallery{
  display:flex;
  gap:5px;
  margin-top:10px;
  min-height:45px;
  align-items:center;
  justify-content:center;
  border:1px dashed rgba(255,255,255,0.15);
  border-radius:10px;
  padding:5px;
}

.miniGallery img{
  width:40px;
  height:40px;
  object-fit:cover;
  border-radius:8px;
}

.placeholder{
  font-size:10px;
  opacity:0.5;
}

/* BOTONES */
.btn{
  display:block;
  margin:6px auto;
  padding:10px;
  width:90%;
  border-radius:12px;
  border:none;
  font-weight:bold;
  color:#fff;
  cursor:pointer;
}
.wp{background:#1dbf73;}
.res{background:#7a2cff;}
.fav{background:#222;}

/* PROFILE */
.profile{
  display:none;
  position:fixed;
  inset:0;
  background:#0a0a0a;
  padding:15px;
  overflow:auto;
  z-index:5000;
}

.box{
  background:rgba(255,255,255,0.04);
  padding:15px;
  border-radius:20px;
}

.phone{
  font-size:26px;
  color:#25f4a5;
}

/* FOOTER */
.footer{
  text-align:center;
  padding:20px;
  font-size:12px;
  color:#aaa;
}
</style>
</head>

<body>

<div class="header">
  <div class="icon" onclick="toggleAccount()">👤</div>
  <div class="search"><input placeholder="Buscar servicios..."></div>
  <div class="icon" onclick="toggleMenu()">☰</div>
</div>

<div class="menu">
  <p onclick="showAll()">🏠 Home</p>
  <p onclick="showFavorites()">❤️ Favoritos</p>
  <p onclick="goBack()">🔙 Volver</p>
</div>

<div class="accountMenu">
  <p>Mi cuenta</p>
  <p>Reservas</p>
</div>

<div class="grid" id="grid"></div>

<div class="profile" id="profile">
  <div class="box">

    <h2 id="name"></h2>
    <p id="info"></p>
    <div class="phone" id="phone"></div>

    <h3>📸 Galería</h3>
    <input type="file" multiple accept="image/*,video/*" onchange="upload(event)">
    <div class="miniGallery" id="media"></div>

    <h3>💬 Comentarios</h3>
    <textarea id="txt"></textarea>
    <button class="btn res" onclick="comment()">Enviar</button>
    <div id="comments"></div>

    <button class="btn wp" onclick="closeP()">Cerrar</button>

  </div>
</div>

<div class="footer">
  © 2026 Marketplace Pro. Todos los derechos reservados.
</div>

<script>

function toggleMenu(){
  let m=document.querySelector(".menu");
  m.style.display=(m.style.display==="block")?"none":"block";
}

function toggleAccount(){
  let m=document.querySelector(".accountMenu");
  m.style.display=(m.style.display==="block")?"none":"block";
}

/* FAVORITOS */
function getFavs(){return JSON.parse(localStorage.getItem("favs")||"[]");}
function saveFavs(f){localStorage.setItem("favs",JSON.stringify(f));}
function isFav(i){return getFavs().includes(i);}

function toggleFav(i){
  let f=getFavs();
  if(f.includes(i)) f=f.filter(x=>x!==i);
  else f.push(i);
  saveFavs(f);
  renderGrid();
}

/* USERS */
const users=[
["Juan Pérez","Caracas","+58","k1.jpg","+58 111",5],
["María López","Maracay","+58","k2.jpg","+58 222",4],
["Carlos Martínez","Valencia","+58","k3.jpg","+58 333",5],
["Ana Torres","Barquisimeto","+58","k4.jpg","+58 444",3],
["Luis Gómez","Caracas","+58","k5.jpg","+58 555",4],
["Sofía Díaz","Valencia","+58","k6.jpg","+58 666",5],
["Pedro Ramírez","Maracaibo","+58","k7.jpg","+58 777",4],
["Lucía Fernández","Maracay","+58","k8.jpg","+58 888",5]
];

let current=0;
let grid=document.getElementById("grid");

function renderGrid(){
grid.innerHTML="";

users.forEach((u,i)=>{

let stars="⭐".repeat(u[5])+"☆".repeat(5-u[5]);

grid.innerHTML+=`
<div class="card" onclick="openP(${i})">

<h3>${u[0]} <span class="online"></span></h3>

<div>${u[1]}</div>

<div class="stars">${stars}</div>

<div class="miniGallery" id="mini_${i}"></div>

<button class="btn wp">WhatsApp</button>
<button class="btn res">Reservar</button>

<button class="btn fav" onclick="toggleFav(${i});event.stopPropagation();">
${isFav(i)?"❤️ Guardado":"🤍 Favorito"}
</button>

</div>`;

setTimeout(()=>loadMini(i),0);
});
}

function loadMini(i){
let box=document.getElementById("mini_"+i);
if(!box) return;

let arr=JSON.parse(localStorage.getItem("m_"+i)||"[]");
let imgs=arr.filter(x=>x.type.includes("image")).slice(0,3);

if(imgs.length===0){
  box.innerHTML=`<div class="placeholder">Sin fotos</div>`;
  return;
}

box.innerHTML=imgs.map(img=>`<img src="${img.data}">`).join("");
}

renderGrid();

/* PROFILE */
function openP(i){
current=i;
document.getElementById("profile").style.display="block";

document.getElementById("name").innerText=users[i][0];
document.getElementById("info").innerText=users[i][1];
document.getElementById("phone").innerText=users[i][4];

loadMedia();
loadComments();
}

function closeP(){
document.getElementById("profile").style.display="none";
}

function upload(e){
let files=e.target.files;
for(let f of files){
let r=new FileReader();
r.onload=function(ev){
let arr=JSON.parse(localStorage.getItem("m_"+current)||"[]");
arr.push({data:ev.target.result,type:f.type});
localStorage.setItem("m_"+current,JSON.stringify(arr));
loadMedia();
renderGrid();
};
r.readAsDataURL(f);
}
}

function loadMedia(){
let box=document.getElementById("media");
box.innerHTML="";
let arr=JSON.parse(localStorage.getItem("m_"+current)||"[]");

arr.forEach(m=>{
box.innerHTML+=m.type.includes("image")
? `<img src="${m.data}">`
: `<video src="${m.data}" controls></video>`;
});
}

function comment(){
let t=document.getElementById("txt").value;
if(!t)return;

let arr=JSON.parse(localStorage.getItem("c_"+current)||"[]");
arr.push(t);
localStorage.setItem("c_"+current,JSON.stringify(arr));

document.getElementById("txt").value="";
loadComments();
}

function loadComments(){
let box=document.getElementById("comments");
box.innerHTML=(JSON.parse(localStorage.getItem("c_"+current)||"[]"))
.map(c=>`<div class="comment">${c}</div>`).join("");
}

function showAll(){renderGrid();}
function showFavorites(){grid.innerHTML="Favoritos activos";}
function goBack(){renderGrid();}

</script>

</body>
</html>
