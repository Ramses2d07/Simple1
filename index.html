<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketplace Pro Final System</title>

<style>
body{
  margin:0;
  font-family:Arial;
  color:#fff;
  background:linear-gradient(135deg,#0b0b0b,#050505);
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px;
  position:sticky;
  top:0;
  background:rgba(20,20,20,0.6);
  backdrop-filter:blur(20px);
  z-index:2000;
}

.icon{font-size:22px;width:40px;text-align:center;cursor:pointer;}

.search{flex:1;margin:0 10px;}
.search input{
  width:100%;
  padding:10px;
  border-radius:12px;
  border:none;
  background:rgba(255,255,255,0.08);
  color:#fff;
}

/* LOGO */
.logo{
  text-align:center;
  padding:12px;
}
.logo img{
  width:180px;
  max-width:80%;
}

/* MENÚS */
.menu,.accountMenu{
  display:none;
  position:absolute;
  top:60px;
  width:200px;
  padding:10px;
  border-radius:14px;
  background:rgba(20,20,20,0.9);
  border:1px solid rgba(255,255,255,0.1);
  z-index:9999;
}
.menu{right:10px;}
.accountMenu{left:10px;}
.menu p,.accountMenu p{cursor:pointer;margin:10px 0;}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  padding:15px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.04);
  border-radius:20px;
  padding:12px;
  border:1px solid rgba(255,255,255,0.08);
  cursor:pointer;
}

/* ONLINE */
.online{
  width:10px;
  height:10px;
  border-radius:50%;
  display:inline-block;
  background:#00ff88;
  margin-left:6px;
  box-shadow:0 0 10px #00ff88;
}

/* ESTRELLAS */
.stars{
  color:#ffd700;
  font-size:14px;
  margin-top:5px;
}

/* GALERÍA */
.miniGallery{
  display:flex;
  gap:5px;
  margin-top:10px;
  min-height:45px;
  justify-content:center;
  border:1px dashed rgba(255,255,255,0.2);
  border-radius:10px;
  padding:5px;
}

.miniGallery img{
  width:40px;
  height:40px;
  object-fit:cover;
  border-radius:8px;
}

/* BOTONES */
.btn{
  display:block;
  margin:6px auto;
  padding:10px;
  width:90%;
  border-radius:12px;
  border:none;
  font-weight:bold;
  color:#fff;
  cursor:pointer;
}
.wp{background:#1dbf73;}
.res{background:#7a2cff;}
.fav{background:#222;}

/* PROFILE */
.profile{
  display:none;
  position:fixed;
  inset:0;
  background:#0a0a0a;
  padding:15px;
  overflow:auto;
  z-index:5000;
}

.box{
  background:rgba(255,255,255,0.04);
  padding:15px;
  border-radius:20px;
}

.phone{
  font-size:26px;
  color:#25f4a5;
}

/* FOOTER */
.footer{
  text-align:center;
  padding:20px;
  font-size:12px;
  color:#aaa;
}

.comment{
  background:rgba(255,255,255,0.12);
  margin-top:6px;
  padding:8px;
  border-radius:10px;
}

textarea{
  width:100%;
  height:70px;
  border-radius:10px;
  padding:10px;
  background:rgba(255,255,255,0.08);
  color:#fff;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="icon" onclick="toggleAccount()">👤</div>
  <div class="search"><input placeholder="Buscar..."></div>
  <div class="icon" onclick="toggleMenu()">☰</div>
</div>

<!-- LOGO -->
<div class="logo">
  <img src="file_0000000095c071fd937e0a46af9303bb.svg">
</div>

<!-- MENÚ -->
<div class="menu">
  <p onclick="showCatalog()">🏠 Catálogo</p>
  <p onclick="showFavorites()">❤️ Favoritos</p>
  <p onclick="goBack()">🔙 Volver</p>
</div>

<div class="accountMenu">
  <p>Mi cuenta</p>
  <p>Reservas</p>
</div>

<!-- GRID -->
<div class="grid" id="grid"></div>

<!-- PROFILE -->
<div class="profile" id="profile">
  <div class="box">
    <h2 id="name"></h2>
    <p id="info"></p>
    <div class="phone" id="phone"></div>

    <h3>💬 Comentarios</h3>
    <textarea id="txt"></textarea>
    <button class="btn res" onclick="comment()">Enviar</button>
    <div id="comments"></div>

    <button class="btn wp" onclick="closeP()">Cerrar</button>
  </div>
</div>

<div class="footer">
© 2026 Marketplace Pro. Todos los derechos reservados.
</div>

<script>

/* VISTA */
let view="catalog";

/* MENÚ */
function toggleMenu(){
  let m=document.querySelector(".menu");
  m.style.display=(m.style.display==="block")?"none":"block";
}
function toggleAccount(){
  let m=document.querySelector(".accountMenu");
  m.style.display=(m.style.display==="block")?"none":"block";
}

/* FAVORITOS */
function getFavs(){return JSON.parse(localStorage.getItem("favs")||"[]");}
function saveFavs(f){localStorage.setItem("favs",JSON.stringify(f));}
function isFav(i){return getFavs().includes(i);}
function toggleFav(i){
  let f=getFavs();
  f.includes(i)?f=f.filter(x=>x!==i):f.push(i);
  saveFavs(f);
  renderGrid();
}

/* LIKES */
function getLikes(){return JSON.parse(localStorage.getItem("likes")||"{}");}
function like(i){
  let l=getLikes();
  l[i]=(l[i]||0)+1;
  localStorage.setItem("likes",JSON.stringify(l));
  renderGrid();
}
function getLikeCount(i){
  let l=getLikes();
  return l[i]||0;
}

/* USERS */
const users=[
["Juan Pérez","Caracas","+58 111",5],
["María López","Maracay","+58 222",4],
["Carlos Martínez","Valencia","+58 333",5],
["Ana Torres","Barquisimeto","+58 444",3],
["Luis Gómez","Caracas","+58 555",4],
["Sofía Díaz","Valencia","+58 666",5],
["Pedro Ramírez","Maracaibo","+58 777",4],
["Lucía Fernández","Maracay","+58 888",5]
];

let grid=document.getElementById("grid");
let current=0;

/* MINI GALERÍA */
function loadMiniHTML(i){
let arr=JSON.parse(localStorage.getItem("m_"+i)||"[]");
let imgs=arr.filter(x=>x.type?.includes("image")).slice(0,3);

if(imgs.length===0) return "<div style='opacity:0.5;font-size:10px'>Sin fotos</div>";

return imgs.map(img=>`<img src="${img.data}">`).join("");
}

/* RENDER */
function renderGrid(){
grid.innerHTML="";

users.forEach((u,i)=>{

if(view==="favorites" && !isFav(i)) return;

let stars="⭐".repeat(u[3])+"☆".repeat(5-u[3]);

grid.innerHTML+=`
<div class="card" onclick="openP(${i})">

<h3>${u[0]} <span class="online"></span></h3>
<div>${u[1]}</div>

<div class="stars">${stars}</div>

<div class="miniGallery">
${loadMiniHTML(i)}
</div>

<button class="btn wp">WhatsApp</button>
<button class="btn res">Reservar</button>

<button class="btn fav" onclick="toggleFav(${i});event.stopPropagation();">
${isFav(i)?"❤️ Guardado":"🤍 Favorito"}
</button>

<div style="margin-top:6px;color:#ff4d6d;cursor:pointer;"
onclick="like(${i});event.stopPropagation();">
❤️ Likes: ${getLikeCount(i)}
</div>

</div>`;
});
}

/* VISTAS */
function showCatalog(){
view="catalog";
renderGrid();
}
function showFavorites(){
view="favorites";
renderGrid();
}
function goBack(){
view="catalog";
renderGrid();
}

/* PROFILE */
function openP(i){
current=i;
document.getElementById("profile").style.display="block";
document.getElementById("name").innerText=users[i][0];
document.getElementById("info").innerText=users[i][1];
document.getElementById("phone").innerText=users[i][2];
loadComments();
}
function closeP(){
document.getElementById("profile").style.display="none";
}

/* COMMENTS */
function comment(){
let t=document.getElementById("txt").value;
if(!t)return;
let arr=JSON.parse(localStorage.getItem("c_"+current)||"[]");
arr.push(t);
localStorage.setItem("c_"+current,JSON.stringify(arr));
document.getElementById("txt").value="";
loadComments();
}
function loadComments(){
let box=document.getElementById("comments");
box.innerHTML=(JSON.parse(localStorage.getItem("c_"+current)||"[]"))
.map(c=>`<div class="comment">${c}</div>`).join("");
}

/* INIT */
renderGrid();

</script>

</body>
</html>
