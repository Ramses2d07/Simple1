<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketplace Ultra Pro</title>

<style>
/* 🌑 BACKGROUND PREMIUM */
body{
  margin:0;
  font-family:Arial;
  color:#fff;
  background:
    radial-gradient(circle at top, rgba(255,255,255,0.06), transparent 60%),
    linear-gradient(135deg,#0b0b0b,#050505);
}

/* HEADER */
.header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:12px;
  position:sticky;
  top:0;
  background:rgba(20,20,20,0.6);
  backdrop-filter:blur(20px);
  z-index:2000;
  border-bottom:1px solid rgba(255,255,255,0.08);
}

.icon{font-size:22px;width:40px;text-align:center;cursor:pointer;}

.search{flex:1;margin:0 10px;}
.search input{
  width:100%;
  padding:10px;
  border-radius:12px;
  border:none;
  background:rgba(255,255,255,0.08);
  color:#fff;
}

/* MENÚS GLASS */
.menu,.accountMenu{
  display:none;
  position:absolute;
  top:60px;
  width:200px;
  padding:10px;
  border-radius:14px;
  background:rgba(20,20,20,0.6);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.08);
  z-index:3000;
}

.menu{right:10px;}
.accountMenu{left:10px;}

.menu p,.accountMenu p{margin:10px 0;cursor:pointer;}

/* LOGO */
.logo{
  text-align:center;
  padding:18px;
}

.logo img{
  width:90%;
  max-width:800px;
  filter:drop-shadow(0 20px 30px rgba(0,0,0,0.8));
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  padding:15px;
}

/* 🧾 CARD ULTRA PRO */
.card{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:22px;
  padding:12px;
  text-align:center;
  cursor:pointer;
  transition:0.4s;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
  position:relative;
  overflow:hidden;
}

.card:hover{
  transform:translateY(-6px) scale(1.02);
  box-shadow:0 18px 45px rgba(0,0,0,0.7);
  border:1px solid rgba(255,255,255,0.15);
}

/* SHINE */
.card::before{
  content:"";
  position:absolute;
  top:-100%;
  left:-50%;
  width:200%;
  height:200%;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,0.08),transparent);
  transform:rotate(25deg);
  transition:0.5s;
}

.card:hover::before{
  top:100%;
}

.card img{
  width:80px;
  height:80px;
  border-radius:50%;
}

/* 🔘 BOTONES ULTRA PRO */
.btn{
  display:block;
  margin:6px auto;
  padding:10px;
  width:90%;
  border-radius:12px;
  font-weight:bold;
  color:#fff;
  position:relative;
  overflow:hidden;
  transition:0.3s;
  box-shadow:0 8px 20px rgba(0,0,0,0.4);
}

.btn:hover{
  transform:translateY(-3px);
  box-shadow:0 12px 28px rgba(0,0,0,0.6);
}

/* WHATSAPP */
.whatsapp{
  background:linear-gradient(135deg,#1dbf73,#128c7e);
}

/* RESERVAR */
.reservar{
  background:linear-gradient(135deg,#7a2cff,#4a1bb3);
}

/* SHINE BUTTON */
.btn::after{
  content:"";
  position:absolute;
  top:-50%;
  left:-60%;
  width:40%;
  height:200%;
  background:rgba(255,255,255,0.25);
  transform:rotate(25deg);
  transition:0.5s;
}

.btn:hover::after{
  left:120%;
}

/* PROFILE */
.profile{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:linear-gradient(180deg,#0a0a0a,#050505);
  overflow:auto;
  z-index:5000;
  padding:15px;
}

/* BOX */
.box{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:20px;
  padding:15px;
}

/* PHONE */
.phone{
  font-size:26px;
  font-weight:bold;
  color:#25f4a5;
  text-shadow:0 0 10px rgba(37,244,165,0.3);
  margin:10px 0;
}

/* MEDIA */
.media{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}

.media img,.media video{
  width:120px;
  border-radius:12px;
  transition:0.3s;
  box-shadow:0 10px 20px rgba(0,0,0,0.5);
}

.media img:hover,.media video:hover{
  transform:scale(1.05);
}

/* COMMENTS */
textarea{
  width:100%;
  height:70px;
  border-radius:10px;
  border:none;
  padding:10px;
  background:rgba(255,255,255,0.08);
  color:#fff;
}

.comment{
  background:rgba(255,255,255,0.12);
  margin-top:6px;
  padding:8px;
  border-radius:10px;
}

/* FOOTER */
.footer{
  text-align:center;
  padding:20px;
  font-size:12px;
  color:#aaa;
  border-top:1px solid rgba(255,255,255,0.08);
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="icon">👤</div>
  <div class="search"><input placeholder="Buscar servicios..."></div>
  <div class="icon">☰</div>
</div>

<!-- LOGO -->
<div class="logo">
  <img src="file_0000000095c071fd937e0a46af9303bb.svg">
</div>

<!-- GRID -->
<div class="grid" id="grid"></div>

<!-- PROFILE -->
<div class="profile" id="profile">

  <div class="box">

    <h2 id="name"></h2>
    <p id="info"></p>

    <div class="phone" id="phone"></div>

    <h3>🧾 Presentación</h3>
    <p id="desc"></p>

    <h3>📸 Galería</h3>
    <input type="file" multiple accept="image/*,video/*" onchange="upload(event)">
    <div class="media" id="media"></div>

    <h3>💬 Reseñas</h3>
    <textarea id="txt"></textarea>
    <button onclick="comment()">Enviar</button>
    <div id="comments"></div>

    <button onclick="closeP()">Cerrar</button>

  </div>

</div>

<!-- FOOTER -->
<div class="footer">
© 2026 Marketplace Ultra Pro. Todos los derechos reservados.
</div>

<script>

const users=[
["Juan Pérez","Caracas","♂","k1.jpg","+58 412 111 1111","Servicio profesional premium"],
["María López","Maracay","♀","k2.jpg","+58 412 222 2222","Atención personalizada de alta calidad"],
["Carlos Martínez","Valencia","♂","k3.jpg","+58 412 333 3333","Especialista en servicios confiables"],
["Ana Torres","Barquisimeto","♀","k4.jpg","+58 412 444 4444","Experiencia y trato profesional"],
["Luis Gómez","Caracas","♂","k5.jpg","+58 412 555 5555","Servicios rápidos y eficientes"],
["Sofía Díaz","Valencia","♀","k6.jpg","+58 412 666 6666","Calidad y confianza garantizada"],
["Pedro Ramírez","Maracaibo","♂","k7.jpg","+58 412 777 7777","Amplia experiencia en el sector"],
["Lucía Fernández","Maracay","♀","k8.jpg","+58 412 888 8888","Atención premium personalizada"]
];

let current=0;

let grid=document.getElementById("grid");

users.forEach((u,i)=>{
grid.innerHTML+=`
<div class="card" onclick="openP(${i})">
<img src="${u[3]}">
<h3>${u[0]}</h3>
<div>${u[1]} | ${u[2]}</div>

<a class="btn whatsapp">WhatsApp</a>
<a class="btn reservar">Reservar</a>
</div>`;
});

function openP(i){
current=i;
document.getElementById("profile").style.display="block";

document.getElementById("name").innerText=users[i][0];
document.getElementById("info").innerText=users[i][1]+" | "+users[i][2];
document.getElementById("phone").innerText="📞 "+users[i][4];
document.getElementById("desc").innerText=users[i][5];

loadMedia();
loadComments();
}

function closeP(){
document.getElementById("profile").style.display="none";
}

/* MEDIA */
function upload(e){
let files=e.target.files;
for(let f of files){
let r=new FileReader();
r.onload=function(ev){
let key="m_"+current;
let arr=JSON.parse(localStorage.getItem(key)||"[]");
arr.push({data:ev.target.result,type:f.type});
localStorage.setItem(key,JSON.stringify(arr));
loadMedia();
};
r.readAsDataURL(f);
}
}

function loadMedia(){
let box=document.getElementById("media");
box.innerHTML="";
let arr=JSON.parse(localStorage.getItem("m_"+current)||"[]");

arr.forEach(m=>{
if(m.type.includes("image")){
box.innerHTML+=`<img src="${m.data}">`;
}else{
box.innerHTML+=`<video src="${m.data}" controls></video>`;
}
});
}

/* COMMENTS */
function comment(){
let t=document.getElementById("txt").value;
if(!t)return;

let key="c_"+current;
let arr=JSON.parse(localStorage.getItem(key)||"[]");
arr.push(t);
localStorage.setItem(key,JSON.stringify(arr));

document.getElementById("txt").value="";
loadComments();
}

function loadComments(){
let box=document.getElementById("comments");
let arr=JSON.parse(localStorage.getItem("c_"+current)||"[]");
box.innerHTML=arr.map(c=>`<div class="comment">${c}</div>`).join("");
}

</script>

</body>
</html>
