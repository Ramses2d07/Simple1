<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketplace Ultra Pro Fixed</title>

<style>
body{
  margin:0;
  font-family:Arial;
  color:#e6e6e6;
  background:linear-gradient(135deg,#1a1a1a,#0f0f0f);
}

/* HEADER */
.header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:12px;
  position:sticky;
  top:0;
  background:rgba(20,20,20,0.8);
  backdrop-filter:blur(20px);
  z-index:2000;
  border-bottom:1px solid rgba(255,255,255,0.08);
}

.icon{font-size:22px;width:40px;text-align:center;cursor:pointer;}

.search{flex:1;margin:0 10px;}
.search input{
  width:100%;
  padding:10px;
  border-radius:12px;
  border:none;
  background:rgba(255,255,255,0.08);
  color:#fff;
}

/* MENÚ */
.menu,.accountMenu{
  display:none;
  position:absolute;
  top:60px;
  width:220px;
  padding:12px;
  border-radius:14px;
  background:rgba(25,25,25,0.95);
  border:1px solid rgba(255,255,255,0.12);
  z-index:9999;
}

.menu{right:10px;}
.accountMenu{left:10px;}

.menu p,.accountMenu p{
  margin:10px 0;
  cursor:pointer;
}

/* LOGO */
.logo{
  text-align:center;
  padding:18px;
}

.logo img{
  width:520px;
  max-width:100%;
  display:block;
  margin:auto;
  filter:drop-shadow(0 20px 30px rgba(0,0,0,0.8));
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  padding:15px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:22px;
  padding:12px;
  text-align:center;
}

/* BOTONES */
.btn{
  display:block;
  margin:6px auto;
  padding:10px;
  width:90%;
  border-radius:12px;
  font-weight:bold;
  color:#fff;
  border:none;
  cursor:pointer;
}

.btn-like{background:#2a2a2a;}
.btn-fav{background:#3a3a3a;}
.whatsapp{background:linear-gradient(135deg,#1dbf73,#128c7e);}
.reservar{background:linear-gradient(135deg,#4b2cff,#2d1a66);}

/* PROFILE */
.profile{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#0f0f0f;
  overflow:auto;
  z-index:5000;
  padding:15px;
}

.box{
  background:rgba(255,255,255,0.04);
  border-radius:20px;
  padding:15px;
}

#profileImg{
  width:100%;
  max-width:260px;
  border-radius:20px;
  margin:10px auto;
  display:block;
}

/* GALERÍA */
.media{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
}

.media img{
  width:100%;
  height:90px;
  object-fit:cover;
  border-radius:10px;
}

textarea{
  width:100%;
  height:70px;
  border-radius:10px;
  border:none;
  padding:10px;
  background:rgba(255,255,255,0.08);
  color:#fff;
}

.comment{
  background:rgba(255,255,255,0.10);
  margin-top:6px;
  padding:8px;
  border-radius:10px;
}

.footer{
  text-align:center;
  padding:20px;
  font-size:12px;
  color:#aaa;
}

.online{
  display:inline-block;
  width:10px;
  height:10px;
  background:#00ff88;
  border-radius:50%;
  margin-left:6px;
}

/* LOCATION */
.location{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#0f0f0f;
  z-index:6000;
  padding:20px;
}

.city{
  padding:12px;
  margin:10px;
  border-radius:12px;
  background:rgba(255,255,255,0.06);
  cursor:pointer;
}

/* FAVORITOS */
.favView{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#0f0f0f;
  z-index:7000;
  padding:20px;
}

/* 🔧 FILTRO AGREGADO */
.filterPanel{
  display:none;
  position:absolute;
  top:60px;
  right:60px;
  width:260px;
  background:rgba(25,25,25,0.95);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:14px;
  padding:12px;
  z-index:9999;
}

.filterPanel label{
  display:block;
  margin:6px 0;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
  <div class="icon" onclick="toggleAccount()">👤</div>
  <div class="search"><input placeholder="Buscar servicios..."></div>

  <!-- ICONO FILTRO (AGREGADO) -->
  <div class="icon" onclick="toggleFilter()">⚙️</div>

  <div class="icon" onclick="toggleMenu()">☰</div>
</div>

<!-- MENÚ -->
<div class="menu" id="menu">
  <p onclick="render();closeMenus()">Catálogo</p>
  <p onclick="openLocation();closeMenus()">📍 Ubicación</p>
  <p onclick="openFavs();closeMenus()">⭐ Favoritos</p>
</div>

<div class="accountMenu" id="accountMenu">
  <p onclick="closeMenus()">Mi cuenta</p>
</div>

<!-- FILTRO PANEL -->
<div class="filterPanel" id="filterPanel">
  <h4>Servicios incluidos</h4>

  <label><input type="checkbox"> 1</label>
  <label><input type="checkbox"> 2</label>
  <label><input type="checkbox"> 3</label>
  <label><input type="checkbox"> 4</label>
  <label><input type="checkbox"> 5</label>
  <label><input type="checkbox"> 6</label>
  <label><input type="checkbox"> 7</label>
  <label><input type="checkbox"> 8</label>
  <label><input type="checkbox"> 9</label>
  <label><input type="checkbox"> 10</label>
  <label><input type="checkbox"> 11</label>
  <label><input type="checkbox"> 12</label>
  <label><input type="checkbox"> 13</label>
  <label><input type="checkbox"> 14</label>
  <label><input type="checkbox"> 15</label>
  <label><input type="checkbox"> 16</label>

  <button class="btn whatsapp" onclick="toggleFilter()">Cerrar</button>
</div>

<!-- LOGO -->
<div class="logo">
  <img src="file_0000000095c071fd937e0a46af9303bb.svg">
</div>

<!-- GRID -->
<div class="grid" id="grid"></div>

<!-- PROFILE -->
<div class="profile" id="profile">
  <div class="box">
    <h2 id="name"></h2>
    <img id="profileImg">
    <p id="info"></p>
    <div id="phone"></div>

    <h3>Presentación</h3>
    <p id="desc"></p>

    <h3>Galería</h3>
    <input type="file" multiple onchange="upload(event)">
    <div class="media" id="media"></div>

    <button class="btn whatsapp" onclick="closeP()">Cerrar</button>
  </div>
</div>

<!-- UBICACIÓN -->
<div class="location" id="location">
  <h2>📍 Ubicación</h2>
  <div class="city" onclick="selectCity('Caracas')">Caracas</div>
  <div class="city" onclick="selectCity('Valencia')">Valencia</div>
  <div class="city" onclick="selectCity('Maracay')">Maracay</div>
  <div class="city" onclick="selectCity('Maracaibo')">Maracaibo</div>
  <button class="btn whatsapp" onclick="closeLocation()">Cerrar</button>
</div>

<!-- FAVORITOS -->
<div class="favView" id="favView">
  <h2>⭐ Favoritos</h2>
  <div id="favList"></div>
  <button class="btn whatsapp" onclick="closeFavs()">Cerrar</button>
</div>

<!-- FOOTER -->
<div class="footer">
© 2026 Marketplace Ultra Pro. Todos los derechos reservados.
</div>

<script>

function toggleFilter(){
  let f=document.getElementById("filterPanel");
  f.style.display = (f.style.display==="block")?"none":"block";
}

/* TU JS ORIGINAL SIN CAMBIOS */
function toggleMenu(){
let m=document.getElementById("menu");
m.style.display=m.style.display==="block"?"none":"block";
}

function toggleAccount(){
let m=document.getElementById("accountMenu");
m.style.display=m.style.display==="block"?"none":"block";
}

function closeMenus(){
document.getElementById("menu").style.display="none";
document.getElementById("accountMenu").style.display="none";
}

const users=[
["Juan Pérez","Caracas","♂","k1.jpg","+58 111","Servicio",5],
["María López","Maracay","♀","k2.jpg","+58 222","Servicio",4],
["Carlos Martínez","Valencia","♂","k3.jpg","+58 333","Servicio",5],
["Ana Torres","Barquisimeto","♀","k4.jpg","+58 444","Servicio",4],
["Luis Gómez","Caracas","♂","k5.jpg","+58 555","Servicio",5],
["Sofía Díaz","Maracaibo","♀","k6.jpg","+58 666","Servicio",5],
["Pedro Ramírez","Valencia","♂","k7.jpg","+58 777","Servicio",4],
["Lucía Fernández","Maracay","♀","k8.jpg","+58 888","Servicio",5]
];

let current=0;
let grid=document.getElementById("grid");

function render(){
grid.innerHTML="";
users.forEach((u,i)=>{
grid.innerHTML+=`
<div class="card" onclick="openP(${i})">
<h3>${u[0]} <span class="online"></span></h3>
<div>${u[1]}</div>
<button class="btn whatsapp">WhatsApp</button>
<button class="btn reservar">Reservar</button>
</div>`;
});
}

function openP(i){
current=i;
document.getElementById("profile").style.display="block";
document.getElementById("name").innerText=users[i][0];
document.getElementById("info").innerText=users[i][1];
document.getElementById("phone").innerText=users[i][4];
document.getElementById("desc").innerText=users[i][5];
document.getElementById("profileImg").src=users[i][3];
}

function closeP(){
document.getElementById("profile").style.display="none";
}

render();

</script>

</body>
</html>
