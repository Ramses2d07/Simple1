<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketplace Pro</title>

<style>
body{
  margin:0;
  font-family:Arial;
  color:#fff;
  background:
  radial-gradient(circle at top, rgba(255,255,255,0.08), transparent 60%),
  linear-gradient(135deg,#1a1a1a,#2a2a2a);
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px;
  position:sticky;
  top:0;
  background:rgba(20,20,20,0.6);
  backdrop-filter:blur(20px);
  z-index:2000;
}

.icon{font-size:22px;width:40px;text-align:center;cursor:pointer;}

.search{flex:1;margin:0 10px;}
.search input{
  width:100%;
  padding:10px;
  border-radius:12px;
  border:none;
  background:rgba(255,255,255,0.08);
  color:#fff;
}

/* MENÚ */
.menu,.accountMenu{
  display:none;
  position:absolute;
  top:60px;
  width:200px;
  padding:10px;
  border-radius:14px;
  background:rgba(20,20,20,0.9);
  border:1px solid rgba(255,255,255,0.1);
  z-index:9999;
}
.menu{right:10px;}
.accountMenu{left:10px;}
.menu p,.accountMenu p{cursor:pointer;margin:10px 0;}

/* LOGO */
.logo{text-align:center;padding:15px;}
.logo img{width:520px;max-width:95%;}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  padding:15px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:20px;
  padding:12px;
  text-align:center;
  cursor:pointer;
}

/* ONLINE */
.online{
  display:inline-block;
  width:10px;
  height:10px;
  background:#00ff88;
  border-radius:50%;
  margin-left:6px;
  box-shadow:0 0 10px #00ff88;
}

/* STARS */
.stars{
  color:#ffd700;
  font-size:14px;
  margin-top:5px;
}

/* MINI GALERÍA */
.miniGallery{
  display:flex;
  gap:4px;
  margin-top:8px;
  justify-content:center;
}

.miniGallery img{
  width:45px;
  height:45px;
  border-radius:8px;
  object-fit:cover;
  cursor:pointer;
}

/* BUTTONS */
.btn{
  display:block;
  margin:6px auto;
  padding:10px;
  width:90%;
  border-radius:12px;
  border:none;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

.wp{background:linear-gradient(135deg,#1dbf73,#128c7e);}
.res{background:linear-gradient(135deg,#7a2cff,#4a1bb3);}
.fav{background:rgba(255,255,255,0.08);}

/* PROFILE */
.profile{
  display:none;
  position:fixed;
  inset:0;
  background:#0a0a0a;
  padding:15px;
  overflow:auto;
  z-index:5000;
}

.box{
  background:rgba(255,255,255,0.04);
  padding:15px;
  border-radius:20px;
}

.phone{font-size:26px;color:#25f4a5;}

/* VIEWER */
.viewer{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  z-index:99999;
  justify-content:center;
  align-items:center;
}

.viewer img{
  max-width:90%;
  max-height:90%;
  border-radius:12px;
}

/* LOCATION */
#locations{
  display:none;
  padding:15px;
}

/* COMMENTS */
textarea{
  width:100%;
  height:70px;
  border-radius:10px;
  padding:10px;
  background:rgba(255,255,255,0.08);
  color:#fff;
}

.comment{
  background:rgba(255,255,255,0.12);
  margin-top:6px;
  padding:8px;
  border-radius:10px;
}

/* FOOTER */
.footer{
  text-align:center;
  padding:20px;
  font-size:12px;
  color:#aaa;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="icon" onclick="toggleAccount()">👤</div>
  <div class="search"><input placeholder="Buscar..."></div>
  <div class="icon" onclick="toggleMenu()">☰</div>
</div>

<!-- LOGO -->
<div class="logo">
  <img src="file_0000000095c071fd937e0a46af9303bb.svg">
</div>

<!-- MENÚ -->
<div class="menu">
  <p onclick="showCatalog()">🏠 Catálogo</p>
  <p onclick="showFavorites()">❤️ Favoritos</p>
  <p onclick="showLocations()">📍 Ubicación</p>
</div>

<div class="accountMenu">
  <p>Mi cuenta</p>
  <p>Reservas</p>
</div>

<!-- GRID -->
<div class="grid" id="grid"></div>

<!-- UBICACIÓN -->
<div id="locations">
  <h2>📍 Ciudades</h2>

  <div class="card" onclick="selectCity('Caracas')">Caracas</div>
  <div class="card" onclick="selectCity('Maracay')">Maracay</div>
  <div class="card" onclick="selectCity('Valencia')">Valencia</div>
  <div class="card" onclick="selectCity('Maracaibo')">Maracaibo</div>

  <button class="btn wp" onclick="backToCatalog()">⬅ Volver</button>
</div>

<!-- PROFILE -->
<div class="profile" id="profile">
  <div class="box">
    <h2 id="name"></h2>
    <p id="info"></p>
    <div class="phone" id="phone"></div>

    <h3>📸 Galería</h3>
    <div class="miniGallery" id="profileGallery"></div>

    <h3>💬 Comentarios</h3>
    <textarea id="txt"></textarea>
    <button class="btn res" onclick="comment()">Enviar</button>
    <div id="comments"></div>

    <button class="btn wp" onclick="closeP()">Cerrar</button>
  </div>
</div>

<!-- VIEWER -->
<div class="viewer" id="viewer" onclick="closeViewer()">
  <img id="viewerImg">
</div>

<div class="footer">
© 2026 Marketplace Pro. Todos los derechos reservados.
</div>

<script>

let current=0;
let selectedCity=null;
let view="catalog";

/* MENÚ */
function toggleMenu(){
  let m=document.querySelector(".menu");
  m.style.display=(m.style.display==="block")?"none":"block";
}

function toggleAccount(){
  let m=document.querySelector(".accountMenu");
  m.style.display=(m.style.display==="block")?"none":"block";
}

/* UBICACIÓN */
function showLocations(){
  document.getElementById("grid").style.display="none";
  document.getElementById("locations").style.display="block";
}

function backToCatalog(){
  document.getElementById("locations").style.display="none";
  document.getElementById("grid").style.display="grid";
  renderGrid();
}

function selectCity(city){
  selectedCity=city;
  backToCatalog();
}

/* MINI GALERÍA */
function getMini(i){
  return JSON.parse(localStorage.getItem("mini_"+i)||"[]");
}

function loadProfileGallery(){
  let box=document.getElementById("profileGallery");
  let arr=getMini(current);

  box.innerHTML=arr.length
    ? arr.map(img=>`<img src="${img}" onclick="openViewer('${img}')">`).join("")
    : "<p style='opacity:0.6'>Sin imágenes</p>";
}

/* VIEWER */
function openViewer(src){
  document.getElementById("viewer").style.display="flex";
  document.getElementById("viewerImg").src=src;
}
function closeViewer(){
  document.getElementById("viewer").style.display="none";
}

/* PROFILE */
function openP(i){
  current=i;
  document.getElementById("profile").style.display="block";
  document.getElementById("name").innerText=users[i][0];
  document.getElementById("info").innerText=users[i][1];
  document.getElementById("phone").innerText=users[i][2];
  loadProfileGallery();
  loadComments();
}

function closeP(){
  document.getElementById("profile").style.display="none";
}

/* COMMENTS */
function comment(){
  let t=document.getElementById("txt").value;
  if(!t)return;

  let arr=JSON.parse(localStorage.getItem("c_"+current)||"[]");
  arr.push(t);
  localStorage.setItem("c_"+current,JSON.stringify(arr));

  document.getElementById("txt").value="";
  loadComments();
}

function loadComments(){
  document.getElementById("comments").innerHTML=
  (JSON.parse(localStorage.getItem("c_"+current)||"[]"))
  .map(c=>`<div class="comment">${c}</div>`).join("");
}

/* USERS */
const users=[
["Juan Pérez","Caracas","+58 111",5],
["María López","Maracay","+58 222",4],
["Carlos Martínez","Valencia","+58 333",5],
["Ana Torres","Barquisimeto","+58 444",3],
["Luis Gómez","Caracas","+58 555",4],
["Sofía Díaz","Valencia","+58 666",5],
["Pedro Ramírez","Maracaibo","+58 777",4],
["Lucía Fernández","Maracay","+58 888",5]
];

/* RENDER */
function renderGrid(){
let grid=document.getElementById("grid");
grid.innerHTML="";

users.forEach((u,i)=>{

if(selectedCity && u[1]!==selectedCity) return;

let stars="⭐".repeat(u[3])+"☆".repeat(5-u[3]);

grid.innerHTML+=`
<div class="card" onclick="openP(${i})">

<h3>${u[0]} <span class="online"></span></h3>
<div>${u[1]}</div>

<div class="stars">${stars}</div>

<button class="btn wp">WhatsApp</button>
<button class="btn res">Reservar</button>

</div>`;
});
}

renderGrid();

</script>

</body>
</html>
