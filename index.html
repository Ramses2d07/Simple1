<head>

<style>
body { 
  font-family: Arial, sans-serif; 
  margin: 0; 
  background-color: #000;
  color: #fff;
}

/* HERO */
.hero {
  text-align: center;
  padding: 140px 20px 40px 20px;
}

/* LOGO MÁS GRANDE (x2+) */
.logo {
  max-width: 650px;
  width: 100%;
  height: auto;
  display: block;
  margin: 0 auto;
}

/* BUSCADOR */
input {
  margin-top: 30px;
  padding: 12px;
  width: 90%;
  max-width: 400px;
  border-radius: 8px;
  border: none;
  background: #222;
  color: #fff;
}

/* GRID: DOS COLUMNAS */
.perfiles { 
  display: grid; 
  grid-template-columns: repeat(2, 1fr); /* Dos columnas fijas */
  gap: 20px; 
  padding: 20px;
}

/* CARD */
.perfil { 
  background: #111;
  border-radius: 12px; 
  padding: 15px; 
  text-align: center; 
}

.perfil img { 
  width: 100px; 
  height: 100px; 
  border-radius: 50%; 
  object-fit: cover;
}

.perfil h2 { 
  color: #8a2be2;
}

.precio {
  color: #00ff88;
  font-weight: bold;
}

/* BOTONES */
.btn {
  display: block;
  margin: 10px 0;
  padding: 12px;
  border-radius: 10px;
  text-decoration: none;
  color: white;
  font-weight: bold;
}

.whatsapp {
  background: #25D366;
}

.reservar {
  background: #8a2be2;
}

/* FOOTER */
.footer {
  text-align: center;
  padding: 20px;
  background: #111;
}
</style>
</head>

<body>

<!-- LOGO -->
<div class="hero">
  <img src="file_0000000095c071fd937e0a46af9303bb.svg" class="logo">

<script>
const buscador = document.getElementById("buscador");

buscador.addEventListener("keyup", function() {
  let filtro = buscador.value.toLowerCase();
  let perfiles = document.querySelectorAll(".perfil");

  perfiles.forEach(p => {
    let texto = p.innerText.toLowerCase();
    p.style.display = texto.includes(filtro) ? "block" : "none";
  });
});
</script>
